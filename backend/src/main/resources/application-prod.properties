# Production Environment Configuration

# Database Configuration (MUST use environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration (NEVER use ddl-auto=update in production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration (MUST use strong secret from environment)
jwt.secret=${JWT_SECRET}

# Logging (Production level)
logging.level.com.expensetracker=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=ERROR

# CORS (Restrict to production frontend only)
cors.allowed-origins=${CORS_ORIGINS:https://expensetracker.com}

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never

# Actuator (Minimal exposure)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# SSL/TLS (Enable if using HTTPS)
server.ssl.enabled=${SSL_ENABLED:false}
