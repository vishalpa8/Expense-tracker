# Production Environment Configuration
server.port=${PORT:8080}

# Database Configuration (MUST use environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool - tuned for Render free tier
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration (MUST use strong secret from environment)
jwt.secret=${JWT_SECRET}

# Logging (Production level)
logging.level.com.expensetracker=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=ERROR

# CORS (Restrict to production frontend only)
cors.allowed-origins=${CORS_ORIGINS:https://expensetracker.com}

# Security Headers
server.error.include-message=never
server.error.include-stacktrace=never

# Actuator (Minimal exposure)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
